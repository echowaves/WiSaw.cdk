schema: spec-driven

context: |
  Tech stack: TypeScript, AWS CDK, AWS AppSync (GraphQL), PostgreSQL + PostGIS, AWS Lambda, Node.js
  Package manager: npm
  Dependency versioning: ALL dependencies in package.json MUST use exact versions (no ^ or ~ prefixes).
  When adding or updating any dependency, always pin to the exact version (e.g. "express": "4.18.2", not "^4.18.2").

rules:
  tasks:
    - When any task involves adding or updating npm dependencies, always use exact version numbers (no ^ or ~) in package.json.
  security:
    - ".env* files must NEVER be committed to version control. They are listed in .gitignore and must stay there."
    - "Secrets, credentials, API keys, tokens, passwords, and any other sensitive values found in .env* files must NEVER be copied, referenced, or hardcoded into any versioned file (source code, config, documentation, specs, tasks, proposals, etc.)."
    - "When referencing environment variables in code, use process.env.VAR_NAME — never inline the actual secret value."
