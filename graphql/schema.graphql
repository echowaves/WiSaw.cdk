schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

# ... ******************************************************
# ...                   types
# ... ******************************************************
type ContactForm {
  id: ID!
  uuid: String!
  description: String!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type Photo {
  row_number: Int!
  id: String!
  uuid: String!
  location: AWSJSON!
  commentsCount: Int!
  watchersCount: Int!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  active: Boolean!
  imgUrl: String!
  thumbUrl: String!
  videoUrl: String!
  lastComment: String!
  video: Boolean!
  width: Int
  height: Int
  locality: String
  district: String
  region: String
  country: String
  countryCode: String
}

type AbuseReport {
  id: ID!
  # photo: Photo!
  photoId: String!
  uuid: String!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type PhotoFeed {
  photos: [Photo]
  batch: String!
  noMoreData: Boolean!
  nextPage: Int
}

type PhotoDetails {
  comments: [Comment]
  recognitions: [Recognition]
  isPhotoWatched: Boolean!
  waveName: String
  waveUuid: String
}

type PhotoAll {
  photo: Photo
  comments: [Comment]
  recognitions: [Recognition]
}

type Watcher {
  id: ID!
  photoId: String!
  uuid: String!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  watchedAt: AWSDateTime!
}

type Comment {
  id: ID!
  photoId: String!
  uuid: String!
  active: Boolean!
  comment: String!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type Recognition {
  id: ID!
  photoId: String!
  metaData: AWSJSON!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type Secret {
  uuid: String!
  nickName: String!
  # secret: String!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

enum WaveFreezeMode {
  AUTO
  FROZEN
  UNFROZEN
}

enum GroupingLevel {
  DISTRICT
  CITY
  REGION
  COUNTRY
}

type Wave {
  waveUuid: String!
  name: String!
  description: String
  createdBy: String!
  freezeMode: WaveFreezeMode!
  location: AWSJSON
  radius: Int
  groupingLevel: GroupingLevel
  anchorLocality: String
  anchorDistrict: String
  anchorRegion: String
  anchorCountry: String
  photos: [Photo]
  photosCount: Int
  open: Boolean!
  splashDate: AWSDateTime!
  freezeDate: AWSDateTime!
  isFrozen: Boolean!
  myRole: String
  joinUrl: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type WaveInvite {
  inviteToken: String!
  waveUuid: String!
  deepLink: String!
  expiresAt: AWSDateTime
  maxUses: Int
  useCount: Int!
  active: Boolean!
  createdAt: AWSDateTime!
}

type WaveMember {
  uuid: String!
  nickName: String
  role: String!
  createdAt: AWSDateTime!
}

type WaveBan {
  uuid: String!
  bannedBy: String!
  reason: String
  createdAt: AWSDateTime!
}

type WaveFeed {
  waves: [Wave]
  batch: String!
  noMoreData: Boolean!
}

type PhotoLocation {
  lat: Float!
  lon: Float!
  photoCount: Int!
  oldestPhotoDate: AWSDateTime!
  newestPhotoDate: AWSDateTime!
}

type AutoGroupResult {
  waveUuid: String
  name: String
  photosGrouped: Int!
  photosRemaining: Int!
  wavesCreated: Int!
  hasMore: Boolean!
  isNewWave: Boolean!
}

type PhotoUploadResult {
  photoId: String!
  waveUuid: String
  photosGrouped: Int!
}

type Friendship {
  friendshipUuid: String!
  uuid1: String! 
  uuid2: String # if uuid2 is null == friendship is not confirmed
  photos: [Photo]
  photosCount: Int
  createdAt: AWSDateTime!  
}

# ... ******************************************************
# ...                   queries
# ... ******************************************************
type Query {
  generateUploadUrl(
    assetKey: String!
    contentType: String!
    ): String!

  zeroMoment: AWSDateTime!
    
  feedByDate(
    daysAgo: Int!
    lat: Float!
    lon: Float!
    batch: String!
    whenToStop: AWSDateTime!
    searchTerm: String
    ): PhotoFeed
  feedForWatcher(
    uuid: String!
    pageNumber: Int!
    batch: String!
    searchTerm: String
    ): PhotoFeed
  feedForWave(
    waveUuid: String!
    pageNumber: Int!
    batch: String!
    searchTerm: String
    sortBy: String
    sortDirection: String
    ): PhotoFeed
  feedRecent(    
    pageNumber: Int!
    batch: String!
    searchTerm: String
    ): PhotoFeed
  feedForTextSearch(
      searchTerm: String!
      pageNumber: Int!
      batch: String!
    ): PhotoFeed

  getPhotoDetails(
    photoId: String!
    uuid: String!
    ): PhotoDetails!

  getPhotoAllCurr( photoId: String!): PhotoAll!
  getPhotoAllNext( photoId: String!): PhotoAll!
  getPhotoAllPrev( photoId: String!): PhotoAll!

  # freindship management 
  # getFriendInFriendship(     
  #   friendshipUuid: String!
  #   uuid: String! # self
  # ): Friend! #every friendship has only 2 friends, this returns the other side of the friendship
  
  getFriendshipsList(
      uuid: String! # self  
  ): [Friendship]! #list of all friends by UUID, if uuid2 of a friend is null, the friendship is not confirmed

  getWave(
    waveUuid: String!
    uuid: String!
  ): Wave

  listWaves(
    pageNumber: Int!
    batch: String!
    uuid: String!
    sortBy: String
    sortDirection: String
    searchTerm: String
  ): WaveFeed

  listPhotoLocations(
    uuid: String!
    radius: Int
  ): [PhotoLocation]!

  feedForUngrouped(
    uuid: String!
    pageNumber: Int!
    batch: String!
    searchTerm: String
  ): PhotoFeed

  getUngroupedPhotosCount(
    uuid: String!
  ): Int!

  getWavesCount(
    uuid: String!
  ): Int!

  getWatchedCount(
    uuid: String!
  ): Int!

  listWaveMembers(
    waveUuid: String!
    uuid: String!
  ): [WaveMember]!
  listWaveInvites(
    waveUuid: String!
    uuid: String!
  ): [WaveInvite]!
  listWaveAbuseReports(
    waveUuid: String!
    uuid: String!
  ): [AbuseReport]!
  listWaveBans(
    waveUuid: String!
    uuid: String!
  ): [WaveBan]!

  isLocationInWave(
    lat: Float!
    lon: Float!
    waveUuid: String!
    uuid: String!
  ): Boolean!

  feedForFriend(
    uuid: String!
    friendUuid: String!
    pageNumber: Int!
    batch: String!
    searchTerm: String
    sortBy: String
    sortDirection: String
  ): PhotoFeed

}

# ... ******************************************************
# ...                    mutations
# ... ******************************************************
type Mutation {
  createContactForm(
    uuid: String!
    description: String!
  ): ContactForm!

  createAbuseReport(
    photoId: String!
    uuid: String!
  ): AbuseReport!

  createPhoto(
    uuid: String!
    lat: Float!
    lon: Float!
    video: Boolean
    ): Photo!

  watchPhoto(
      photoId: String!
      uuid: String!
    ): Int!
  unwatchPhoto(
      photoId: String!
      uuid: String!
    ): Int!

  deletePhoto(
      photoId: String!
      uuid: String!
    ): String!

  createComment(
      photoId: String!
      uuid: String!
      description: String!
    ): Comment!
  deleteComment(
      commentId: ID!
      uuid: String!
    ): String! # returns "OK"

  registerSecret(
    uuid: String!
    nickName: String!
    secret: String!    
  ): Secret!
  updateSecret(
    uuid: String!
    nickName: String!
    secret: String!    
    newSecret: String!
  ): Secret!

# freindship management 
  createFriendship(
      uuid: String!
  ): Friendship!
  acceptFriendshipRequest(
    friendshipUuid: String!
    uuid: String! # self
  ): Friendship!
  deleteFriendship(
    friendshipUuid: String!
   ): String! # returns "OK"

  deleteWave(
    waveUuid: String!
    uuid: String!
   ): Boolean!

  createWave(
    name: String!
    description: String!
    uuid: String! # createdBy
    lat: Float
    lon: Float
    radius: Int
    groupingLevel: GroupingLevel
    splashDate: AWSDateTime
    freezeDate: AWSDateTime
   ): Wave!

  updateWave(
    waveUuid: String!
    uuid: String!
    name: String
    description: String
    lat: Float
    lon: Float
    radius: Int
    groupingLevel: GroupingLevel
    open: Boolean
    splashDate: AWSDateTime
    freezeDate: AWSDateTime
    freezeMode: WaveFreezeMode
   ): Wave!

  removePhotoFromWave(
    waveUuid: String!
    photoId: String!
    uuid: String!
   ): Boolean!

  autoGroupPhotosIntoWaves(
    uuid: String!
    groupingLevel: GroupingLevel!
   ): AutoGroupResult!

  addPhotoToWave(
    waveUuid: String!
    photoId: String!
    uuid: String!
    ): Boolean!

  mergeWaves(
    targetWaveUuid: String!
    sourceWaveUuid: String!
    uuid: String!
    name: String
    description: String
   ): Wave!

  createWaveInvite(
    waveUuid: String!
    uuid: String!
    expiresAt: AWSDateTime
    maxUses: Int
  ): WaveInvite!
  revokeWaveInvite(
    inviteToken: String!
    uuid: String!
  ): Boolean!
  joinWaveByInvite(
    inviteToken: String!
    uuid: String!
  ): Wave!
  joinOpenWave(
    waveUuid: String!
    uuid: String!
  ): Wave!
  assignFacilitator(
    waveUuid: String!
    targetUuid: String!
    uuid: String!
  ): Boolean!
  removeFacilitator(
    waveUuid: String!
    targetUuid: String!
    uuid: String!
  ): Boolean!
  removeUserFromWave(
    waveUuid: String!
    targetUuid: String!
    uuid: String!
  ): Boolean!
  reportWavePhoto(
    waveUuid: String!
    photoId: String!
    uuid: String!
  ): AbuseReport!
  dismissWaveReport(
    reportId: ID!
    uuid: String!
  ): Boolean!
  banUserFromWave(
    waveUuid: String!
    targetUuid: String!
    uuid: String!
    reason: String
  ): Boolean!

  # Mutation triggers subscription - called by Lambda to notify clients
  _notifyPhotoUploadComplete(
    photoId: String!
    photosGrouped: Int!
  ): PhotoUploadResult!
}

  # helloWorld(helloMessage: String!): String!
   


# ... ******************************************************
# ...                    subscriptions
# ... ******************************************************
# onSendMessage(chatUuid: String!): Message!

type Subscription {
  _notifyPhotoUploadComplete(photoId: String!, photosGrouped: Int!): PhotoUploadResult
    @aws_subscribe(mutations: ["_notifyPhotoUploadComplete"])
}
